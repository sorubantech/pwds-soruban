      margin-bottom: 20px;
      padding-left: 8px;

      flex-wrap: wrap;
      gap: 32px;
      justify-content: center;
    }

      border-radius: 16px;
      padding: 16px;
      width: 325px;
    }
    .screen-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 900;
      color: #fff;

      font-size: 13px;
      font-weight: 700;
      color: #f1f5f9;
    }
    .screen-card-tag {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: auto;
      flex-shrink: 0;
    }

      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 0;
      font-size: 11px;
      font-weight: 700;
      color: #475569;
