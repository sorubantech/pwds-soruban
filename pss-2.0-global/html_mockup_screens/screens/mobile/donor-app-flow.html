      border-radius: 16px;
      padding: 16px;

    }

      gap: 10px;

      font-weight: 900;

      font-size: 13px;
      font-weight: 700;
      color: #f1f5f9;
    }
    .screen-card-tag {

      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: auto;
      flex-shrink: 0;

      justify-content: center;

      padding: 8px 0;

      font-weight: 700;
